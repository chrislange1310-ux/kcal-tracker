<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kcal Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --forest:#0E1712;
    --forest-2:#16231A;
    --moss:#6B9459;
    --sage:#8FA08A;
    --paper:#0E1712;
    --card:#16211A;
    --ink:#F0F1EA;
    --ink-soft:#8FA08A;
    --line:#26332A;
    --rust:#D08A4E;
    --good:#7FB069;
    --gold:#E3B94E;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 0 90px;}

  /* Header */
  .hero{
    background:transparent;
    color:var(--ink);
    padding:22px 18px 6px;
    position:relative;
    overflow:hidden;
  }
  .hero::after{ content:none; }
  .hero h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:1.5rem;
    margin:0 0 2px;
    letter-spacing:-0.01em;
    color:var(--ink);
  }
  .hero .sub{color:var(--ink-soft);font-size:0.8rem;}
  .hero .daynav{display:flex;align-items:center;gap:10px;margin-top:14px;}
  .daynav button{
    background:rgba(255,255,255,0.08);
    border:none;color:var(--ink);width:28px;height:28px;border-radius:50%;
    font-size:0.9rem;cursor:pointer;
  }
  .daynav .lbl{font-family:'IBM Plex Mono',monospace;font-size:0.8rem;color:var(--ink-soft);}

  .content{padding:8px 16px 0;}

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:16px;
    padding:18px;
    margin-bottom:14px;
    box-shadow:none;
  }

  .budget-card{
    background:var(--card);
    margin-top:0;
    position:relative;
    z-index:2;
  }
  .budget{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px;}
  .budget .lbl{font-size:0.7rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.07em;}
  .budget .num{font-family:'Fraunces',serif;font-size:2.4rem;font-weight:600;line-height:1;color:var(--gold);}
  .budget.over .num{color:var(--rust);}
  .budget .target{text-align:right;font-family:'IBM Plex Mono',monospace;font-size:0.95rem;color:var(--ink-soft);}

  .bar-track{height:8px;background:#22301F;border-radius:6px;overflow:hidden;}
  .bar-fill{height:100%;background:linear-gradient(90deg, var(--moss), var(--good));border-radius:6px;transition:width .35s ease;}
  .bar-fill.over{background:linear-gradient(90deg, #C97B4A, var(--rust));}

  .stat-row{display:flex;gap:8px;margin-top:14px;}
  .stat{flex:1;background:var(--paper);border-radius:10px;padding:9px 10px;}
  .stat .v{font-family:'IBM Plex Mono',monospace;font-size:1.05rem;font-weight:600;color:#FFFFFF;}
  .stat .k{color:var(--ink-soft);font-size:0.66rem;text-transform:uppercase;letter-spacing:.05em;margin-top:1px;}

  h2{
    font-family:'Fraunces',serif;
    font-size:1.05rem;
    font-weight:600;
    margin:0 0 12px;
    color:var(--ink);
    display:flex;align-items:center;gap:8px;
  }
  h2 .dot{width:7px;height:7px;border-radius:50%;background:var(--gold);display:inline-block;}

  .group-tabs{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:12px;
  }
  .group-tab{
    border:1px solid var(--line);
    background:var(--forest-2);
    color:var(--ink-soft);
    border-radius:8px;
    padding:7px 11px;
    font-size:0.74rem;
    font-weight:600;
    cursor:pointer;
    font-family:'Inter',sans-serif;
  }
  .group-tab.active{
    background:var(--moss);
    color:#fff;
    border-color:var(--moss);
  }
  .group-label{
    font-size:0.68rem;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--ink-soft);
    margin:12px 0 6px;
  }
  .group-label:first-child{margin-top:0;}

  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{
    border:1px solid var(--line);
    background:var(--forest-2);
    border-radius:20px;
    padding:6px 12px;
    font-size:0.78rem;
    cursor:pointer;
    color:var(--ink);
    transition:background .15s, color .15s;
  }
  .chip:active{background:var(--moss);color:#fff;border-color:var(--moss);}

  .sport-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
  .sport-card{
    border:1px solid var(--line);
    background:var(--forest-2);
    border-radius:12px;
    padding:12px 13px;
    cursor:pointer;
  }
  .sport-card .s-name{font-size:0.82rem;font-weight:600;color:var(--ink);line-height:1.25;}
  .sport-card .s-kcal{font-size:0.78rem;color:var(--good);margin-top:5px;font-family:'IBM Plex Mono',monospace;}
  .sport-card:active{border-color:var(--moss);}

  .entry-list{list-style:none;padding:0;margin:0;}
  .entry-list li{
    display:flex;justify-content:space-between;align-items:center;
    padding:9px 0;border-bottom:1px solid var(--line);font-size:0.86rem;
  }
  .entry-list li:last-child{border-bottom:none;}
  .entry-meta{color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;font-size:0.76rem;display:flex;align-items:center;gap:6px;}
  .del{background:none;border:none;color:var(--ink-soft);cursor:pointer;font-size:1rem;padding:2px 4px;}

  .form-row{display:flex;gap:8px;margin-top:10px;}
  input, select{
    font-family:'Inter',sans-serif;
    border:1px solid var(--line);
    background:var(--forest-2);
    border-radius:8px;
    padding:9px 10px;
    font-size:0.85rem;
    color:var(--ink);
    width:100%;
  }
  input:focus, select:focus{outline:2px solid var(--moss);outline-offset:0;}
  button.primary{
    background:var(--moss);
    color:#fff;border:none;border-radius:8px;
    padding:9px 16px;font-size:0.85rem;cursor:pointer;
    font-weight:600;white-space:nowrap;
  }
  button.primary:active{background:var(--good);}

  .tabbar{
    position:fixed;bottom:0;left:0;right:0;
    background:var(--card);
    border-top:1px solid var(--line);
    display:flex;max-width:520px;margin:0 auto;
    padding-bottom:env(safe-area-inset-bottom, 0);
  }
  .tabbar button{
    flex:1;background:none;border:none;padding:12px 0 10px;
    font-size:0.72rem;color:var(--ink-soft);cursor:pointer;letter-spacing:.02em;
  }
  .tabbar button.active{color:var(--gold);font-weight:700;}

  .weight-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-family:'IBM Plex Mono',monospace;font-size:0.82rem;}
  .weight-row:last-child{border-bottom:none;}
  .delta{font-size:0.72rem;}
  .delta.down{color:var(--good);} .delta.up{color:var(--rust);}
  canvas{width:100%;height:180px;}
  .note{font-size:0.78rem;color:var(--ink-soft);margin-top:8px;line-height:1.45;}
  .divider{border:none;border-top:1px dashed var(--line);margin:14px 0;}
  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .settings-grid label{font-size:0.72rem;color:var(--ink-soft);display:block;margin-bottom:3px;}
  .save-msg{font-size:0.78rem;color:var(--good);margin-top:8px;height:1em;}

  .history-row{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 0;border-bottom:1px solid var(--line);cursor:pointer;
  }
  .history-row:last-child{border-bottom:none;}
  .history-row .d-date{font-size:0.85rem;font-weight:600;color:var(--ink);}
  .history-row .d-sub{font-size:0.72rem;color:var(--ink-soft);margin-top:1px;}
  .history-row .d-kcal{font-family:'IBM Plex Mono',monospace;font-size:0.92rem;text-align:right;color:var(--gold);}
  .badge{
    display:inline-block;padding:2px 7px;border-radius:10px;font-size:0.66rem;
    font-weight:600;margin-left:6px;
  }
  .badge.good{background:rgba(127,176,105,0.18);color:var(--good);}
  .badge.over{background:rgba(208,138,78,0.18);color:var(--rust);}

  .toast{
    position:fixed;bottom:70px;left:50%;transform:translateX(-50%);
    background:var(--moss);color:#fff;padding:8px 16px;border-radius:20px;
    font-size:0.8rem;opacity:0;pointer-events:none;transition:opacity .25s ease;z-index:50;
  }
  .toast.show{opacity:0.96;}
</style>
</head>

function pad2(n){ return n<10 ? '0'+n : ''+n; }
function todayISO(){
  const d = new Date();
  return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());
}
function addDays(iso, n){
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  dt.setDate(dt.getDate()+n);
  return dt.getFullYear()+'-'+pad2(dt.getMonth()+1)+'-'+pad2(dt.getDate());
}
function fmtDate(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('de-DE', {weekday:'short', day:'2-digit', month:'2-digit'});
}
function fmtDateLong(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('de-DE', {weekday:'long', day:'2-digit', month:'2-digit', year:'numeric'});
}

function daysSinceBackup(){
  const last = localStorage.getItem(STORAGE_KEY+'_lastBackup');
  if(!last) return 999;
  const [y,m,d] = last.split('-').map(Number);
  const then = new Date(y, m-1, d);
  const now = new Date();
  const nowMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  return Math.round((nowMid - then) / 86400000);
}
function renderBackupBanner(){
  const days = daysSinceBackup();
  if(days < 3) return '';
  return `<div class="card" style="border-color:var(--gold);background:rgba(227,185,78,0.08)">
    <div style="font-size:0.85rem;font-weight:600;color:var(--gold);margin-bottom:4px;">Automatisches Backup hat nicht geklappt</div>
    <div class="note" style="margin-top:0">${days>900?'Noch nie gesichert.':'Letztes Backup vor '+days+' Tagen.'} Normalerweise läuft das beim Öffnen automatisch – falls dein Browser das blockiert hat, hier manuell nachholen.</div>
    <div class="form-row"><button class="primary" id="banner-backup-btn" style="width:100%">Jetzt sichern</button></div>
  </div>`;
}

function triggerBackup(){
  const dataStr = JSON.stringify(state, null, 2);
  const blob = new Blob([dataStr], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = todayISO();
  a.href = url;
  a.download = `chris_tracker_backup_${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  localStorage.setItem(STORAGE_KEY+'_lastBackup', stamp);
  showToast('Backup-Datei heruntergeladen.');
}

const DEFAULT_STATE_VERSION = 'v20260720a';

async function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    const storedVersion = localStorage.getItem(STORAGE_KEY+'_defaultVersion');
    if(raw){
      const stored = JSON.parse(raw);
      if(!stored.profile){
        state = JSON.parse(JSON.stringify(DEFAULT_STATE));
      } else if(storedVersion !== DEFAULT_STATE_VERSION){
        // New DEFAULT_STATE shipped since last open: merge once.
        // DEFAULT_STATE wins for any date it defines (Claude's latest
        // known-correct data); dates only present locally (entered
        // directly in the app, not yet reported back) are kept as-is.
        const mergedDays = {...stored.days};
        for(const d in DEFAULT_STATE.days){ mergedDays[d] = DEFAULT_STATE.days[d]; }

        const weightMap = {};
        (stored.weights||[]).forEach(w => weightMap[w.date] = w.kg);
        (DEFAULT_STATE.weights||[]).forEach(w => weightMap[w.date] = w.kg);
        const mergedWeights = Object.keys(weightMap).sort().map(date => ({date, kg: weightMap[date]}));

        state = {
          profile: DEFAULT_STATE.profile,
          weights: mergedWeights,
          days: mergedDays,
          _viewDate: null
        };
      } else {
        // Same version as last time: trust local data fully, including
        // any edits made directly in the app since then.
        state = stored;
      }
    } else {
      state = JSON.parse(JSON.stringify(DEFAULT_STATE));
    }
    localStorage.setItem(STORAGE_KEY+'_defaultVersion', DEFAULT_STATE_VERSION);
    saveState();
  }catch(e){
    state = JSON.parse(JSON.stringify(DEFAULT_STATE));
  }
  render();
  // Automatic backup: if it's been a day or more since the last backup,
  // download one right now without waiting for a tap. Runs every time
  // the app is opened, so in daily use this fires roughly once a day.
  if(daysSinceBackup() >= 1){
    setTimeout(()=>{ triggerBackup(); }, 800);
  }
}

let saveTimeout;
function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }catch(e){
    console.error('Storage error', e);
    showToast('Speichern fehlgeschlagen – Speicher evtl. voll.');
  }
}
function queueSave(){ clearTimeout(saveTimeout); saveTimeout = setTimeout(saveState, 250); }

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1600);
}

function getDay(dateISO){
  if(!state.days[dateISO]) state.days[dateISO] = {foods:[], sport:[]};
  return state.days[dateISO];
}

function computeTargetsForDay(dateISO){
  const p = state.profile;
  const noSportTarget = p.baseTarget - p.deficit;
  const day = state.days[dateISO] || {foods:[], sport:[]};
  const sportKcal = day.sport.reduce((s,x)=>s+x.kcal,0);
  const target = noSportTarget + sportKcal;
  const consumed = day.foods.reduce((s,x)=>s+x.kcal,0);
  const protein = day.foods.reduce((s,x)=>s+(x.protein||0),0);
  return {noSportTarget, sportKcal, target, consumed, protein, remaining: target - consumed};
}

  else if(activeTab==='sport') app.innerHTML = renderSport();

  else if(activeTab==='history') app.innerHTML = renderHistory();
  else if(activeTab==='weight') app.innerHTML = renderWeight();
  else app.innerHTML = renderSettings();
  attachHandlers();
  if(activeTab==='weight') drawChart();
  if(activeTab==='trends') drawTrendsChart();
}

function isIncompleteDay(dateISO){
  const day = state.days[dateISO];
  if(!day) return false;
  const hasNoSport = day.sport.length === 0;
  const looksReconstructed = day.foods.some(f => f.name.includes('rekonstruiert'));
  return hasNoSport && looksReconstructed;
}
function isProteinUnknown(dateISO){
  const day = state.days[dateISO];
  if(!day) return false;
  const totalProtein = day.foods.reduce((s,f)=>s+(f.protein||0),0);
  const looksReconstructed = day.foods.some(f => f.name.includes('rekonstruiert'));
  return totalProtein === 0 && looksReconstructed;
}

function renderTrends(){
  const allDates = Object.keys(state.days).sort();
  const last7 = allDates.slice(-7);
  const last14 = allDates.slice(-14);

  const stats7 = last7.map(d => ({date:d, incomplete: isIncompleteDay(d), proteinUnknown: isProteinUnknown(d), ...computeTargetsForDay(d)}));
  const reliable7 = stats7.filter(s => !s.incomplete);
  const proteinKnown7 = stats7.filter(s => !s.proteinUnknown);
  const avgKcal = reliable7.length ? Math.round(reliable7.reduce((s,t)=>s+t.consumed,0)/reliable7.length) : 0;
  const avgProtein = proteinKnown7.length ? Math.round(proteinKnown7.reduce((s,t)=>s+t.protein,0)/proteinKnown7.length) : 0;
  const overDays = reliable7.filter(t => t.remaining < 0).length;
  const avgTarget = reliable7.length ? Math.round(reliable7.reduce((s,t)=>s+t.target,0)/reliable7.length) : 0;
  const incompleteCount = stats7.length - reliable7.length;
  const proteinUnknownCount = stats7.length - proteinKnown7.length;

  // protein trend: compare first half vs second half of last7
  let proteinTrendTxt = 'zu wenig Daten';
  if(proteinKnown7.length >= 4){
    const mid = Math.floor(proteinKnown7.length/2);
    const firstAvg = proteinKnown7.slice(0,mid).reduce((s,t)=>s+t.protein,0)/mid;
    const secondAvg = proteinKnown7.slice(mid).reduce((s,t)=>s+t.protein,0)/(proteinKnown7.length-mid);
    const diff = secondAvg - firstAvg;
    proteinTrendTxt = diff > 3 ? `steigend (+${Math.round(diff)}g)` : diff < -3 ? `fallend (${Math.round(diff)}g)` : 'stabil';
  }

  return `
    <div class="hero">
      <h1>Trends</h1>
      <div class="sub">Letzte ${last7.length} erfasste Tage</div>
    </div>
    <div class="content">
      <div class="card budget-card">
        <div class="stat-row">
          <div class="stat"><div class="v">${avgKcal}</div><div class="k">Ø kcal / Tag</div></div>
          <div class="stat"><div class="v">${avgProtein}g</div><div class="k">Ø Protein</div></div>
          <div class="stat"><div class="v">${overDays}/${reliable7.length}</div><div class="k">Tage über Budget</div></div>
        </div>
        <div class="note">Ø Ziel in diesem Zeitraum: ${avgTarget} kcal. Protein-Trend: ${proteinTrendTxt}.${incompleteCount ? ' '+incompleteCount+' Tag(e) ohne Sport-Log ausgeschlossen (kcal-Schnitt).' : ''}${proteinUnknownCount ? ' '+proteinUnknownCount+' Tag(e) ohne Protein-Daten ausgeschlossen (Protein-Schnitt).' : ''}</div>
      </div>

      <div class="card">
        <h2><span class="dot"></span>Kcal je Tag (letzte ${last14.length})</h2>
        <canvas id="trends-chart"></canvas>
        <div class="note">Grün = im Budget, Orange = drüber, Grau = kein Sport-Log (unsicher). Gestrichelte Linie = Tagesziel.</div>
      </div>
    </div>
  `;
}

function drawTrendsChart(){
  const canvas = document.getElementById('trends-chart');
  if(!canvas) return;
  const allDates = Object.keys(state.days).sort();
  const last14 = allDates.slice(-14);
  if(!last14.length) return;

  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 180 * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const w = rect.width, h = 180;
  ctx.clearRect(0,0,w,h);

  const stats = last14.map(d => ({date:d, incomplete: isIncompleteDay(d), ...computeTargetsForDay(d)}));
  const maxVal = Math.max(...stats.map(s=>Math.max(s.consumed, s.target))) * 1.1;
  const padL=8, padR=8, padT=10, padB=22;
  const barW = (w - padL - padR) / stats.length * 0.62;
  const gap = (w - padL - padR) / stats.length;
  const Y = v => padT + (1-(v/maxVal)) * (h-padT-padB);

  stats.forEach((s,i)=>{
    const x = padL + i*gap + (gap-barW)/2;
    const barTop = Y(s.consumed);
    const over = s.consumed > s.target;
    ctx.fillStyle = s.incomplete ? '#555F52' : (over ? '#D08A4E' : '#7FB069');
    ctx.fillRect(x, barTop, barW, (h-padB)-barTop);

    if(!s.incomplete){
      ctx.strokeStyle = '#8FA08A';
      ctx.setLineDash([2,2]);
      ctx.beginPath();
      ctx.moveTo(x-2, Y(s.target));
      ctx.lineTo(x+barW+2, Y(s.target));
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // date label (every other to avoid crowding)
    if(i % 2 === 0 || stats.length <= 7){
      ctx.fillStyle = '#8FA08A';
      ctx.font = '8px IBM Plex Mono';
      ctx.textAlign = 'center';
      const d = new Date(s.date+'T00:00:00');
      ctx.fillText(d.getDate()+'.'+(d.getMonth()+1)+'.', x+barW/2, h-6);
    }
  });
  ctx.textAlign = 'left';
}

function renderHistory(){
  const dates = Object.keys(state.days).sort((a,b)=>b.localeCompare(a));
  const rows = dates.map(d=>{
    const t = computeTargetsForDay(d);
    const over = t.remaining < 0;
    return `<div class="history-row" data-jump="${d}">
      <div>
        <div class="d-date">${fmtDate(d)}${over?`<span class="badge over">+${Math.abs(t.remaining)}</span>`:`<span class="badge good">−${t.remaining}</span>`}</div>
        <div class="d-sub">${t.protein}g Protein${t.sportKcal ? ' · Sport +'+t.sportKcal+' kcal' : ' · kein Sport'}</div>
      </div>
      <div class="d-kcal">${t.consumed}<span style="color:var(--ink-soft);font-size:0.72rem"> / ${t.target}</span></div>
    </div>`;
  }).join('');

  return `
    <div class="hero" style="border-radius:0 0 22px 22px;">
      <h1>Verlauf</h1>
      <div class="sub">Alle erfassten Tage im Überblick</div>
    </div>
    <div class="content">
      <div class="card">
        ${rows || '<div class="note">Noch keine Tage erfasst.</div>'}
      </div>
      <div class="note">Tippe auf einen Tag, um ihn in "Heute" zu öffnen und zu bearbeiten.</div>
    </div>
  `;
}

function renderWeight(){
  const p = state.profile;
  const weights = [...state.weights].sort((a,b)=>a.date.localeCompare(b.date));
  const first = weights[0], last = weights[weights.length-1];
  const totalLost = first ? (first.kg - last.kg).toFixed(1) : 0;

  const startD = new Date(p.startDate), goalD = new Date(p.goalDate), lastD = new Date(last.date);
  const totalDays = (goalD-startD)/86400000;
  const elapsedDays = (lastD-startD)/86400000;
  const neededRate = (p.startWeight - p.goalWeight) / (totalDays/7);
  const actualRate = elapsedDays>0 ? (totalLost / (elapsedDays/7)) : 0;
  const onTrack = actualRate >= neededRate*0.85;

  const rows = [...weights].reverse().map((w,idx,arr)=>{
    const prev = arr[idx+1];
    let delta = '';
    if(prev){
      const d = (w.kg - prev.kg).toFixed(1);
      delta = `<span class="delta ${d>0?'up':'down'}">${d>0?'+':''}${d}</span>`;
    }
    return `<div class="weight-row"><span>${fmtDate(w.date)}</span><span>${w.kg} kg ${delta}</span></div>`;
  }).join('');

  return `
    <div class="hero">
      <h1>Gewichtsverlauf</h1>
      <div class="sub">Start ${p.startWeight}kg · Ziel ${p.goalWeight}kg bis ${fmtDate(p.goalDate)}</div>
    </div>
    <div class="content">
      <div class="card budget-card">
        <canvas id="weight-chart"></canvas>
        <div class="stat-row">
          <div class="stat"><div class="v">${last.kg} kg</div><div class="k">Aktuell</div></div>
          <div class="stat"><div class="v">−${totalLost} kg</div><div class="k">Bisher</div></div>
          <div class="stat"><div class="v" style="color:${onTrack?'var(--good)':'var(--rust)'}">${actualRate.toFixed(2)}</div><div class="k">kg/Wo. (Soll ${neededRate.toFixed(2)})</div></div>
        </div>
        <div class="note">${onTrack ? 'Du liegst im Soll oder darüber – bei diesem Tempo erreichst du dein Ziel vor Dezember.' : 'Etwas hinter dem nötigen Tempo – kein Drama bei einzelnen Wochen, aber im Blick behalten.'}</div>
      </div>

      <div class="card">
        <h2><span class="dot"></span>Neuer Eintrag</h2>
        <div class="form-row">
          <input type="date" id="weight-date" value="${todayISO()}">
          <input type="number" step="0.1" id="weight-kg" placeholder="kg" style="max-width:90px">
          <button class="primary" id="add-weight-btn">OK</button>
        </div>
      </div>

      <div class="card">
        <h2><span class="dot"></span>Verlauf</h2>
        ${rows}
      </div>
    </div>
  `;
}

  return `
    <div class="hero">
      <h1>Einstellungen</h1>
      <div class="sub">Basisdaten &amp; Zielwerte</div>
    </div>
    <div class="content">
      <div class="card budget-card">
        <h2><span class="dot"></span>Körperdaten</h2>
        <div class="settings-grid">

        <h2><span class="dot"></span>Kalorien</h2>

          <div><label>Base Target (kcal/Tag)</label><input type="number" id="s-base" value="${p.baseTarget}"></div>
          <div><label>Defizit-Ziel (kcal)</label><input type="number" id="s-deficit" value="${p.deficit}"></div>
          <div><label>Zufuhr ohne Sport</label><input type="number" disabled value="${p.baseTarget - p.deficit}" style="opacity:.6"></div>
        </div>
        <div class="form-row"><button class="primary" id="save-settings-btn" style="width:100%">Speichern</button></div>
        <div class="save-msg" id="save-msg"></div>
      </div>
      <div class="card">
        <h2><span class="dot"></span>Daten</h2>
        <div class="note">Alle Daten werden lokal in diesem Browser gespeichert (localStorage, Key: ${STORAGE_KEY}) – offline nutzbar, aber gebunden an dieses Gerät und diesen Browser. Kein Cloud-Abgleich zwischen Geräten.</div>
        <div class="form-row"><button class="primary" id="export-btn" style="width:100%">Daten exportieren (kopieren)</button></div>
        <textarea id="export-box" readonly style="display:none;width:100%;height:110px;margin-top:8px;font-family:'IBM Plex Mono',monospace;font-size:0.7rem;background:var(--forest-2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px;"></textarea>
        <div class="group-label" style="margin-top:16px">Wiederherstellen</div>
        <textarea id="import-box" placeholder="Exportierten Text hier einfügen..." style="width:100%;height:80px;font-family:'IBM Plex Mono',monospace;font-size:0.7rem;background:var(--forest-2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px;"></textarea>
        <div class="form-row"><button class="primary" id="import-btn" style="width:100%">Wiederherstellen</button></div>
        <div class="form-row"><button class="primary" id="reset-btn" style="width:100%;background:var(--rust)">Alle Daten zurücksetzen</button></div>
      </div>
    </div>
  `;
}

// ---------- HANDLERS ----------
function attachHandlers(){
  document.querySelectorAll('.tabbar button').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab===activeTab);
    b.onclick = ()=>{ activeTab = b.dataset.tab; editingFoodIdx = null; render(); };
  });

  if(activeTab==='today'){
    const dateISO = state._viewDate || todayISO();

    const prevBtn = document.getElementById('day-prev');
    const nextBtn = document.getElementById('day-next');
    if(prevBtn) prevBtn.onclick = ()=>{ state._viewDate = addDays(dateISO,-1); editingFoodIdx = null; render(); };
    if(nextBtn) nextBtn.onclick = ()=>{
      if(dateISO===todayISO()) return;
      state._viewDate = addDays(dateISO,1); editingFoodIdx = null; render();
    };

    const bannerBtn = document.getElementById('banner-backup-btn');
    if(bannerBtn) bannerBtn.onclick = ()=>{ triggerBackup(); render(); };

    document.querySelectorAll('[data-group]').forEach(btn=>{
      btn.onclick = ()=>{ selectedGroup = parseInt(btn.dataset.group); render(); };
    });
    document.querySelectorAll('[data-food-name]').forEach(chip=>{
      chip.onclick = ()=>{
        getDay(dateISO).foods.push({
          name: chip.dataset.foodName,
          kcal: parseFloat(chip.dataset.foodKcal),
          protein: parseFloat(chip.dataset.foodProtein)
        });
        queueSave(); render();
      };
    });
    document.querySelectorAll('[data-del-food]').forEach(btn=>{
      btn.onclick = ()=>{ getDay(dateISO).foods.splice(btn.dataset.delFood,1); queueSave(); render(); };
    });
    document.querySelectorAll('[data-edit-food]').forEach(btn=>{
      btn.onclick = ()=>{ editingFoodIdx = parseInt(btn.dataset.editFood); render(); };
    });
    const saveFoodBtn = document.querySelector('[data-save-food]');
    if(saveFoodBtn){
      saveFoodBtn.onclick = ()=>{
        const i = parseInt(saveFoodBtn.dataset.saveFood);
        const name = document.getElementById('edit-food-name').value.trim();
        const kcal = parseFloat(document.getElementById('edit-food-kcal').value);
        const protein = parseFloat(document.getElementById('edit-food-protein').value) || 0;
        if(!name || isNaN(kcal)){ showToast('Name und kcal nötig'); return; }
        getDay(dateISO).foods[i] = {name, kcal, protein};
        editingFoodIdx = null;
        queueSave(); render();
      };
    }
    const cancelFoodBtn = document.querySelector('[data-cancel-food]');
    if(cancelFoodBtn) cancelFoodBtn.onclick = ()=>{ editingFoodIdx = null; render(); };
    document.getElementById('add-food-btn').onclick = ()=>{
      const name = document.getElementById('food-name').value.trim();
      const kcal = parseFloat(document.getElementById('food-kcal').value);
      const protein = parseFloat(document.getElementById('food-protein').value) || 0;
      if(!name || isNaN(kcal)){ showToast('Name und kcal nötig'); return; }
      getDay(dateISO).foods.push({name, kcal, protein});
      queueSave(); render();
    };
  }

  if(activeTab==='sport'){
    const dateISO = state._viewDate || todayISO();

    const prevBtn = document.getElementById('day-prev');
    const nextBtn = document.getElementById('day-next');
    if(prevBtn) prevBtn.onclick = ()=>{ state._viewDate = addDays(dateISO,-1); render(); };
    if(nextBtn) nextBtn.onclick = ()=>{
      if(dateISO===todayISO()) return;
      state._viewDate = addDays(dateISO,1); render();
    };

    document.querySelectorAll('[data-sport]').forEach(chip=>{
      chip.onclick = ()=>{
        const s = SPORT_OPTIONS[chip.dataset.sport];
        getDay(dateISO).sport.push({name:s.name, kcal:s.kcal});
        queueSave(); render();
      };
    });
    document.querySelectorAll('[data-del-sport]').forEach(btn=>{
      btn.onclick = ()=>{ getDay(dateISO).sport.splice(btn.dataset.delSport,1); queueSave(); render(); };
    });
  }

  if(activeTab==='history'){
    document.querySelectorAll('[data-jump]').forEach(row=>{
      row.onclick = ()=>{ state._viewDate = row.dataset.jump; activeTab='today'; render(); };
    });
  }

  if(activeTab==='weight'){
    document.getElementById('add-weight-btn').onclick = ()=>{
      const date = document.getElementById('weight-date').value;
      const kg = parseFloat(document.getElementById('weight-kg').value);
      if(!date || isNaN(kg)){ showToast('Datum und kg nötig'); return; }
      const existing = state.weights.find(w=>w.date===date);
      if(existing) existing.kg = kg; else state.weights.push({date, kg});
      queueSave(); render();
    };
  }

  if(activeTab==='settings'){
    document.getElementById('save-settings-btn').onclick = async ()=>{
      const p = state.profile;
      p.age = parseInt(document.getElementById('s-age').value)||p.age;
      p.height = parseInt(document.getElementById('s-height').value)||p.height;
      p.startWeight = parseFloat(document.getElementById('s-startw').value)||p.startWeight;
      p.startDate = document.getElementById('s-startd').value||p.startDate;
      p.goalWeight = parseFloat(document.getElementById('s-goalw').value)||p.goalWeight;
      p.goalDate = document.getElementById('s-goald').value||p.goalDate;
      p.bmr = parseInt(document.getElementById('s-bmr').value)||p.bmr;
      p.baseTarget = parseInt(document.getElementById('s-base').value)||p.baseTarget;
      p.deficit = parseInt(document.getElementById('s-deficit').value)||p.deficit;
      await saveState();
      document.getElementById('save-msg').textContent = 'Gespeichert.';
      setTimeout(render, 600);
    };
    document.getElementById('export-btn').onclick = ()=>{
      triggerBackup();
      document.getElementById('export-box').value = JSON.stringify(state, null, 2);
      document.getElementById('export-box').style.display = 'block';
    };
    document.getElementById('import-btn').onclick = ()=>{
      const txt = document.getElementById('import-box').value.trim();
      if(!txt){ showToast('Kein Text eingefügt.'); return; }
      try{
        const parsed = JSON.parse(txt);
        if(!parsed.profile || !parsed.days){ throw new Error('invalid'); }
        state = parsed;
        saveState();
        showToast('Wiederhergestellt.');
        render();
      }catch(e){
        showToast('Konnte den Text nicht lesen – Format prüfen.');
      }
    };
    document.getElementById('reset-btn').onclick = async ()=>{
      if(!confirm('Wirklich alle Daten löschen?')) return;
      state = JSON.parse(JSON.stringify(DEFAULT_STATE));
      await saveState();
      render();
    };
  }
}

function drawChart(){
  const canvas = document.getElementById('weight-chart');
  if(!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = 180 * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const w = rect.width, h = 180;
  ctx.clearRect(0,0,w,h);

  const p = state.profile;
  const weights = [...state.weights].sort((a,b)=>a.date.localeCompare(b.date));
  const startD = new Date(p.startDate), goalD = new Date(p.goalDate);
  const minX = startD.getTime(), maxX = goalD.getTime();
  const kgs = weights.map(x=>x.kg).concat([p.goalWeight, p.startWeight]);
  const minY = Math.min(...kgs) - 1, maxY = Math.max(...kgs) + 1;

  const padL=32, padR=8, padT=10, padB=20;
  const X = t => padL + ( (t-minX)/(maxX-minX) ) * (w-padL-padR);
  const Y = v => padT + (1-( (v-minY)/(maxY-minY) )) * (h-padT-padB);

  ctx.strokeStyle = '#3A4A38';
  ctx.setLineDash([4,4]);
  ctx.beginPath();
  ctx.moveTo(X(minX), Y(p.startWeight));
  ctx.lineTo(X(maxX), Y(p.goalWeight));
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#8FA08A';
  ctx.font = '10px IBM Plex Mono';
  ctx.fillText(maxY.toFixed(0), 2, Y(maxY)+4);
  ctx.fillText(minY.toFixed(0), 2, Y(minY)+4);

  const grad = ctx.createLinearGradient(0,0,w,0);
  grad.addColorStop(0, '#A9C39A');
  grad.addColorStop(1, '#3F6B3A');
  ctx.strokeStyle = grad;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  weights.forEach((pt,i)=>{
    const x = X(new Date(pt.date).getTime()), y = Y(pt.kg);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();

  weights.forEach(pt=>{
    const x = X(new Date(pt.date).getTime()), y = Y(pt.kg);
    ctx.fillStyle = '#3F6B3A';
    ctx.beginPath(); ctx.arc(x,y,3.5,0,7); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x,y,1.4,0,7); ctx.fill();
  });
}

window.addEventListener('resize', ()=>{ if(activeTab==='weight') drawChart(); if(activeTab==='trends') drawTrendsChart(); });
loadState();
</script>
